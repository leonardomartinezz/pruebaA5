<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/componente.css">
</head>
<body class="d-flex align-items-center py-4 bg-light min-vh-100">
  <main class="form-signin w-100 m-auto" style="max-width: 400px;">
    <div class="card bg-white border shadow-sm">
<div class="card-body p-4">
        <div class="text-center mb-3">
          <img src="img/logo.png" alt="Logo de la Institución" width="80" height="80" style="object-fit: contain;">
        </div>
        
        <h1 class="h3 mb-3 fw-normal text-center" style="color: #000000;">Iniciar Sesión</h1>
        <form id="formLogin" autocomplete="off">
          <p class="text-muted text-center mb-3" style="font-size: 14px;">Ingrese su correo electrónico</p>
          
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="correoLogin" placeholder="nombre@ejemplo.com" required autocomplete="off">
            <label for="correoLogin" class="text-dark">Correo electrónico</label>
          </div>
          
        <div class="form-floating mb-4">
  <input type="password" class="form-control" id="passLogin" placeholder="Contraseña" required autocomplete="new-password">
  <label for="passLogin" class="text-dark">Contraseña</label>
  
  <div class="d-flex flex-wrap gap-2 mt-2 px-1">
    <span id="reqMayus" class="badge rounded-pill text-bg-light border text-secondary fw-normal">Mayúscula</span>
    <span id="reqMinus" class="badge rounded-pill text-bg-light border text-secondary fw-normal">Minúscula</span>
    <span id="reqNum" class="badge rounded-pill text-bg-light border text-secondary fw-normal">Número</span>
    <span id="reqEsp" class="badge rounded-pill text-bg-light border text-secondary fw-normal">Especial</span>
    <span id="reqLen" class="badge rounded-pill text-bg-light border text-secondary fw-normal">8+ caracteres</span>
  </div>
</div>
          
          <button class="btn btn-dark w-100 py-2 mt-3" type="submit" id="btnAcceder">Acceder</button>
        </form>
      </div>
    </div>
  </main>

  <script src="js/utileria.js"></script>
  <script src="js/componente.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
