<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/componente.css">
</head>
<body class="bg-light" style="color: #000000;">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container-fluid">
      <button class="btn btn-outline-dark me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
        ☰ Menú
      </button>
<a class="navbar-brand fw-bold d-flex align-items-center" href="#" style="color: #000000;">
  <img src="img/logo.png" alt="Logo de la Institución" width="55" height="55" class="me-2" style="object-fit: contain;">
  Sistema Escolar
</a>      <div class="d-flex ms-auto">
        <div class="dropdown">
          <button class="btn btn-light border dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
            <span id="nombreUsuarioNavbar">Usuario</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
            <li><a class="dropdown-item" href="#" id="btnSalir">Salir del sistema</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start bg-white" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold" style="color: #000000;">Menú Principal</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle active text-dark" href="#" role="button" data-bs-toggle="dropdown">
            Usuarios
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Captura</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card bg-white border shadow-sm">
          <div class="card-body p-4">
            <h4 class="mb-4 fw-bold text-center" style="color: #000000;">Captura de Alumnos</h4>
            
            <form id="formCaptura" autocomplete="off">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label text-dark">Nombre Completo</label>
                  <input type="text" class="form-control" id="nombreAlumno" required autocomplete="off">
                  <div class="invalid-feedback">Solo se permiten letras y espacios.</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label text-dark">Número de Control (6 dígitos)</label>
                  <input type="text" class="form-control" id="numControl" required autocomplete="off">
                  <div class="invalid-feedback">Debe contener exactamente 6 dígitos.</div>
                </div>
              </div>
              
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label text-dark">Correo Electrónico</label>
                  <input type="email" class="form-control" id="correoAlumno" required autocomplete="off">
                  <div class="invalid-feedback">Ingresa un correo válido.</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label text-dark">Fecha de Nacimiento</label>
                  <input type="date" class="form-control" id="fechaNac" required>
                </div>
              </div>
              
              <button type="submit" class="btn btn-dark w-100 mt-3 py-2">Guardar Alumno</button>
            </form>
            
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utileria.js"></script>
  <script src="js/componente.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
